<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Privacy Policy — Files in PDF</title>
    <meta name="description" content="Privacy Policy for Files in PDF. Learn how we handle your data when you use our free PDF embedded file extractor tool.">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://filesinpdf.com/privacy">

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Privacy Policy — Files in PDF">
    <meta property="og:description" content="Privacy Policy for Files in PDF. Learn how we handle your data.">
    <meta property="og:url" content="https://filesinpdf.com/privacy">
    <meta property="og:site_name" content="Files in PDF">
    <meta property="og:image" content="https://filesinpdf.com/static/images/og-image.svg">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Privacy Policy — Files in PDF">

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebPage",
      "name": "Privacy Policy — Files in PDF",
      "url": "https://filesinpdf.com/privacy",
      "isPartOf": {
        "@type": "WebApplication",
        "name": "Files in PDF",
        "url": "https://filesinpdf.com/"
      }
    }
    </script>

    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="stylesheet" href="/static/css/style.css">
    {{if and .UmamiURL .UmamiWebsiteID}}
    <script async src="{{.UmamiURL}}/script.js" data-website-id="{{.UmamiWebsiteID}}"></script>
    {{end}}
</head>
<body>
    <div class="container legal-container">
        <a href="/" class="back-link">&larr; Back to home</a>
        <h1>Privacy Policy</h1>
        {{.Content}}
    </div>

    <footer class="footer">
        <p>Made by <a href="https://eduardopaulcs.com" target="_blank" rel="noopener">Paul</a>{{if .DonationURL}} &middot; <a href="{{.DonationURL}}" target="_blank" rel="noopener">Donate</a>{{end}}</p>
        <p class="copyright">&copy; 2026 Eduardo Paul Contardi Soria &middot; <a href="https://github.com/eduardopaulcs/embedded-pdf-files" target="_blank" rel="noopener">GitHub</a> &middot; <a href="/terms">Terms</a> &middot; <a href="/privacy">Privacy</a></p>
    </footer>
</body>
</html>
